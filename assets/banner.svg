<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="800" height="220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.5"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c7d2fe"/>
      <stop offset="100%" style="stop-color:#a5f3fc"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="220" rx="16" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#6366f1" stroke-width="0.5">
    <line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="100" y1="0" x2="100" y2="220"/>
    <line x1="200" y1="0" x2="200" y2="220"/>
    <line x1="300" y1="0" x2="300" y2="220"/>
    <line x1="400" y1="0" x2="400" y2="220"/>
    <line x1="500" y1="0" x2="500" y2="220"/>
    <line x1="600" y1="0" x2="600" y2="220"/>
    <line x1="700" y1="0" x2="700" y2="220"/>
  </g>

  <!-- Decorative floating nodes (background) -->
  <circle cx="680" cy="45" r="2" fill="#6366f1" opacity="0.15"/>
  <circle cx="720" cy="70" r="1.5" fill="#06b6d4" opacity="0.12"/>
  <circle cx="750" cy="35" r="1" fill="#6366f1" opacity="0.1"/>
  <circle cx="650" cy="180" r="1.5" fill="#06b6d4" opacity="0.1"/>
  <circle cx="700" cy="160" r="2" fill="#6366f1" opacity="0.12"/>
  <circle cx="740" cy="190" r="1" fill="#06b6d4" opacity="0.08"/>
  <line x1="680" y1="45" x2="720" y2="70" stroke="#6366f1" stroke-width="0.5" opacity="0.08"/>
  <line x1="720" y1="70" x2="750" y2="35" stroke="#06b6d4" stroke-width="0.5" opacity="0.06"/>
  <line x1="650" y1="180" x2="700" y2="160" stroke="#6366f1" stroke-width="0.5" opacity="0.06"/>

  <!-- Logo icon (neural network) -->
  <g transform="translate(80, 42) scale(1.15)">
    <!-- Connection lines -->
    <line x1="60" y1="35" x2="35" y2="58" stroke="url(#grad2)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="60" y1="35" x2="85" y2="58" stroke="url(#grad2)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="35" y1="58" x2="28" y2="85" stroke="url(#grad2)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="35" y1="58" x2="60" y2="80" stroke="url(#grad2)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="85" y1="58" x2="92" y2="85" stroke="url(#grad2)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="85" y1="58" x2="60" y2="80" stroke="url(#grad2)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="28" y1="85" x2="60" y2="80" stroke="url(#grad2)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="92" y1="85" x2="60" y2="80" stroke="url(#grad2)" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Outer pulse ring -->
    <circle cx="60" cy="35" r="12" fill="none" stroke="url(#grad)" stroke-width="1" opacity="0.2"/>

    <!-- Nodes -->
    <circle cx="60" cy="35" r="7" fill="url(#grad)"/>
    <circle cx="35" cy="58" r="5.5" fill="url(#grad)"/>
    <circle cx="85" cy="58" r="5.5" fill="url(#grad)"/>
    <circle cx="28" cy="85" r="4" fill="url(#grad)"/>
    <circle cx="60" cy="80" r="6" fill="url(#grad)"/>
    <circle cx="92" cy="85" r="4" fill="url(#grad)"/>

    <!-- Inner highlights -->
    <circle cx="59" cy="33.5" r="2.5" fill="white" opacity="0.3"/>
    <circle cx="34" cy="56.5" r="2" fill="white" opacity="0.25"/>
    <circle cx="84" cy="56.5" r="2" fill="white" opacity="0.25"/>
  </g>

  <!-- Project name -->
  <text x="280" y="105" font-family="'SF Pro Display', 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="56" font-weight="700" fill="url(#textGrad)" letter-spacing="-1">Neuragram</text>

  <!-- Tagline -->
  <text x="283" y="142" font-family="'SF Pro Text', 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="17" fill="#94a3b8" letter-spacing="0.5">The SQLite of Agent Memory</text>

  <!-- Bottom accent line -->
  <rect x="283" y="158" width="80" height="2" rx="1" fill="url(#grad)" opacity="0.4"/>
</svg>
